<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo — Agenda</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <div class="header">
      <span>📋 Registro</span>
    </div>
    <div class="content">

      <!-- Saudação -->
      <div class="saudacao" id="saudacao"></div>

      <!-- Formulário de registro -->
      <div class="secao">
        <h3>Registrar uso</h3>
        <div class="form-group">
          <label for="data-atividade">Data</label>
          <input type="date" id="data-atividade">
        </div>
        <div class="form-group">
          <label for="app-atividade">Aplicativo</label>
          <input type="text" id="app-atividade" placeholder="Ex: Instagram, YouTube...">
        </div>
        <div class="form-group">
          <label for="tempo-atividade">Tempo (minutos)</label>
          <input type="number" id="tempo-atividade" placeholder="Ex: 30" min="1" max="1440">
        </div>
        <button class="blue" id="btn-salvar">Salvar registro</button>
      </div>

      <!-- Resumo diário -->
      <div class="secao">
        <h3>Resumo de hoje</h3>
        <div id="resumo-diario" class="progress-container">
          <div class="progress-info">
            <span class="progress-label">Uso hoje</span>
            <span class="progress-value" id="tempo-hoje">0 min</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="barra-progresso" style="width: 0%"></div>
          </div>
          <div class="progress-msg" id="msg-limite"></div>
        </div>

        <!-- Limite configurável -->
        <div class="limite-config">
          <label for="input-limite">Limite diário:</label>
          <input type="number" id="input-limite" min="10" max="1440" placeholder="120">
          <span style="font-size:13px; color: var(--text-light);">min</span>
          <button class="ghost" onclick="configurarLimite()" style="padding: 6px 14px; font-size: 13px; width: auto;">Salvar</button>
        </div>
      </div>

      <!-- Histórico -->
      <div class="secao">
        <h3>Histórico de uso</h3>

        <!-- Filtro por data -->
        <div class="filtro-row">
          <input type="date" id="filtro-data" placeholder="Filtrar por data">
          <button class="ghost" onclick="aplicarFiltro()" style="width:auto; padding: 8px 14px; font-size: 13px;">Filtrar</button>
          <button class="ghost" onclick="limparFiltro()" style="width:auto; padding: 8px 14px; font-size: 13px;">✕</button>
        </div>

        <div id="lista-atividades" class="lista-container"></div>
      </div>

      <!-- Navegação -->
      <button class="yellow" onclick="window.location.href='relatorios.html'">Ver Relatórios 📊</button>

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
