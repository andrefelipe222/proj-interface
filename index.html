<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo — Seu Controle de Tela</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <div class="header">
      <span>⏱ Tempo</span>
    </div>
    <div class="content">

      <div class="login-hero">
        <span class="app-icon">⏱️</span>
        <h1>Tempo</h1>
        <p>Gerencie seu tempo de tela de forma inteligente e saudável.</p>
      </div>

      <div class="secao">
        <div class="form-group">
          <label for="nome-usuario">Como posso te chamar?</label>
          <input type="text" id="nome-usuario" placeholder="Digite seu nome..." maxlength="30">
        </div>
        <button class="btn-primary" onclick="login()">Entrar →</button>
      </div>

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
